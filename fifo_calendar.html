<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FIFO Roster — Luke Barton</title>

<!--
=============================================================================
  FIFO ROSTER CALENDAR — QUICK EDIT GUIDE
  Created with Claude (claude.ai) — June 2026
  Owner: Luke Barton
=============================================================================

  HOW THIS FILE WORKS:
  - Hosted on GitHub Pages, displayed via WebsiteWidget on Samsung S22 Ultra
  - TOP OF PAGE = a rolling 4-week view (this week + next 3) + countdown banner
    This is what WebsiteWidget screenshots for the 4x6 home screen widget.
  - BELOW THAT = the full month-by-month calendar, June 2026 to Dec 2028.
    You only see this when you tap the widget to open the full page in browser.
  - WebsiteWidget refreshes once per day — the rolling weeks shift automatically.

  TO EDIT ON GITHUB:
  - Go to github.com → your repository → fifo_calendar.html
  - Click the pencil (edit) icon → find the section you want → edit → Commit changes
  - Live within a minute or two.

=============================================================================
  !! IMPORTANT — CREW ASSIGNMENT !!
=============================================================================
  At the time this calendar was created, Luke was UNSURE which crew he would
  be assigned to. The calendar is currently set to CREW A.

  IF YOU NEED TO SWITCH TO CREW B — make ONE change:
    Find "const MY_CREW = 'A';" below and change to: const MY_CREW = 'B';
  That single change updates the rolling weeks, full calendar, and countdown
  banner automatically — nothing else needs to change.

  SCHEDULE LOGIC (same for both crews, just offset by 7 days):
  - ANCHOR date = Tuesday 7 July 2026 = Crew A Day 1
  - Every Tuesday = handover/travel day (shown as Travel Day)
  - Crew A: Tue D1 → Wed-Mon working → Tue D8 (handover) → 6 days off
  - Crew B: starts on that same Tue D8, works Wed-Mon → Tue handover → 6 days off
  - Full cycle = 14 days
  - Crew A working: cycle positions 0 (Tue D1), 1-6 (Wed-Mon), 7 (Tue D8)
  - Crew B working: cycle positions 7 (Tue D1), 8-13 (Wed-Mon), 0 (Tue D8)

  IF UPLOADING THIS FILE TO A NEW CLAUDE CHAT FOR HELP:
  - Tell Claude: "I am on Crew A (or B), ANCHOR is 7 July 2026, cycle is 14 days"
  - MY_CREW variable controls everything — calendar, rolling weeks, countdown
  - The myStatus() function returns 'travel', 'work', 'off', or null (pre-roster)

=============================================================================
  SECTION 1 — ROSTER ANCHOR DATE
=============================================================================
  Format: new Date(YEAR, MONTH-1, DAY)  <-- month is 0-indexed!
=============================================================================

=============================================================================
  SECTION 2 — QUEENSLAND PUBLIC HOLIDAYS
=============================================================================
  Format: "YYYY-MM-DD": "Holiday Name",
  Source: https://www.queenslandpublicholidays.com.au/
  Add new years when published (usually Nov/Dec of the previous year).
  Ekka is Brisbane-only — delete those lines if not in Brisbane.
=============================================================================

=============================================================================
  SECTION 3 — FAMILY BIRTHDAYS
=============================================================================
  Format: "MM-DD": "Name",  (repeats every year automatically)
  CURRENT: Luke 01-16, Adriana 01-17, Michael 02-20, Mum 03-01,
           Dad 04-22, Steph 08-17, Stefaniya 08-18, David 11-14, Kayleen 12-20
=============================================================================

=============================================================================
  SECTION 4 — SPORTS & SPECIAL EVENTS
=============================================================================
  Format: "YYYY-MM-DD": "Short Label",  (confirmed dates only)
=============================================================================

=============================================================================
  SECTION 5 — WIDGET / DISPLAY SETTINGS
=============================================================================
  ROLLING_WEEKS: how many weeks show at the top (widget area). Default 4.
  WIDGET_WEEK_START: 0 = Sunday, 1 = Monday. Default 0 (Sunday).
  CALENDAR RANGE for the full scroll-down view: June 2026 → December 2028.
  TO EXTEND: find "const MAX" and change { y: YEAR, m: MONTH_INDEX }
  Month index: Jan=0 Feb=1 Mar=2 Apr=3 May=4 Jun=5 Jul=6 Aug=7 Sep=8 Oct=9 Nov=10 Dec=11
=============================================================================
-->

<style>
  :root {
    /* Background layers */
    --bg-base:       #0D0F14;
    --bg-surface:    #13161E;
    --bg-border:     #262B3A;

    /* Working day — steel blue */
    --work-from:     #1A3A6B;
    --work-to:       #1E4D8C;
    --work-accent:   #3B82D4;
    --work-num:      #F4F8FF;

    /* Travel day — amber */
    --travel-from:   #4A2C00;
    --travel-to:     #6B3D00;
    --travel-accent: #D97706;
    --travel-num:    #FFF6E5;

    /* Off day */
    --off-bg:        #13161E;
    --off-num:       #C2C8DC;

    /* Pre-roster */
    --pre-num:       #3A3F52;

    /* Accents */
    --today-ring:    #E8340A;
    --ph-color:      #9F4576;
    --bday-color:    #6D5FD8;
    --sport-color:   #0E7A56;
    --green-accent:  #1DB854;

    /* Text */
    --text-primary:  #F4F6FB;
    --text-secondary:#A4AAC2;
    --text-muted:    #4A5068;

    --font-main: system-ui, -apple-system, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
  html, body { background: var(--bg-base); color: var(--text-primary); font-family: var(--font-main); scroll-behavior: smooth; }

  /* =====================================================================
     WIDGET ZONE — rolling weeks + countdown (top of page = widget capture)
     ===================================================================== */
  #widget-zone {
    padding: 12px 6px 10px;
    max-width: 430px;
    margin: 0 auto;
  }

  .widget-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 0 4px 8px;
  }
  .widget-header .wh-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .widget-header .wh-crew {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--work-accent);
    background: rgba(59,130,212,0.12);
    border: 1px solid rgba(59,130,212,0.3);
    padding: 2px 8px;
    border-radius: 10px;
  }

  .week-row { margin-bottom: 4px; }
  .week-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
  }
  .dh-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    padding: 0 1px 3px;
  }
  .dh {
    text-align: center;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .dc {
    min-height: 46px;
    border-radius: 7px;
    padding: 4px 2px 3px;
    border: 1px solid transparent;
    position: relative;
    overflow: hidden;
  }
  .dn {
    font-size: 13px;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 2px;
    font-variant-numeric: tabular-nums;
    text-align: center;
  }
  .pill {
    display: block;
    font-size: 7px;
    font-weight: 700;
    letter-spacing: 0.02em;
    border-radius: 3px;
    padding: 1.5px 2px;
    margin-top: 2px;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.3;
  }

  .today-cell { box-shadow: 0 0 0 2px var(--today-ring), 0 0 10px rgba(232,51,10,0.35); }
  .today-cell .dn { color: #fff !important; }

  .cwork {
    background: linear-gradient(160deg, var(--work-from) 0%, var(--work-to) 100%);
    border-color: rgba(59,130,212,0.3);
  }
  .cwork .dn { color: var(--work-num); }

  .ctravel {
    background: linear-gradient(160deg, var(--travel-from) 0%, var(--travel-to) 100%);
    border-color: rgba(217,119,6,0.35);
  }
  .ctravel .dn { color: var(--travel-num); }

  .coff { background: var(--off-bg); border-color: var(--bg-border); }
  .coff .dn { color: var(--off-num); }

  .cpre { background: transparent; border-color: transparent; }
  .cpre .dn { color: var(--pre-num); }

  .pill-work   { background: var(--work-accent);   color: #fff; }
  .pill-travel { background: var(--travel-accent);  color: #fff; }
  .pill-ph     { background: var(--ph-color);       color: #fff; }
  .pill-bday   { background: var(--bday-color);     color: #fff; }
  .pill-sport  { background: var(--sport-color);    color: #fff; }

  /* ── Countdown banner — inline under rolling weeks, captured by widget ── */
  #countdown-banner {
    margin-top: 10px;
    background: linear-gradient(135deg, #14171F, #1A1E2A);
    border: 1px solid var(--bg-border);
    border-radius: 16px;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .cd-icon  { font-size: 20px; line-height: 1; }
  .cd-main  { display: flex; flex-direction: column; gap: 1px; flex: 1; }
  .cd-count { display: flex; align-items: baseline; gap: 5px; }
  .cd-days  {
    font-size: 24px;
    font-weight: 800;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
  }
  .cd-unit  { font-size: 13px; font-weight: 600; color: var(--text-secondary); }
  .cd-label { font-size: 11px; color: var(--text-secondary); letter-spacing: 0.01em; font-weight: 500; }

  #countdown-banner.on-swing   { border-color: rgba(59,130,212,0.4); }
  #countdown-banner.on-swing   .cd-days { color: var(--work-accent); }
  #countdown-banner.on-break   { border-color: rgba(29,184,84,0.4); }
  #countdown-banner.on-break   .cd-days { color: var(--green-accent); }
  #countdown-banner.on-travel  { border-color: rgba(217,119,6,0.45); }
  #countdown-banner.on-travel  .cd-days { color: var(--travel-accent); }
  #countdown-banner.pre-roster { border-color: var(--bg-border); }
  #countdown-banner.pre-roster .cd-days { color: var(--text-secondary); }

  /* =====================================================================
     DIVIDER between widget zone and full scrollable calendar
     ===================================================================== */
  #scroll-divider {
    max-width: 430px;
    margin: 18px auto 0;
    padding: 14px 10px 10px;
    border-top: 1px dashed var(--bg-border);
    text-align: center;
  }
  #scroll-divider .sd-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  /* =====================================================================
     FULL CALENDAR ZONE — scrollable, only seen when tapped into browser
     ===================================================================== */
  #full-cal-zone {
    padding: 4px 3px 110px;
    max-width: 430px;
    margin: 0 auto;
  }

  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 8px 12px;
    padding: 10px 7px 10px;
    border-bottom: 1px solid var(--bg-border);
    margin-bottom: 4px;
  }
  .leg { display: flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 500; color: var(--text-secondary); }
  .ldot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

  .month-block { margin-bottom: 6px; }
  .month-sticky {
    position: sticky;
    top: 0;
    z-index: 20;
    background: var(--bg-base);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 8px 6px 6px;
    border-bottom: 1px solid var(--bg-border);
    margin-bottom: 3px;
  }
  .month-title {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .month-title .current-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--today-ring);
    box-shadow: 0 0 6px var(--today-ring);
  }

  .month-grid-full {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    padding: 0 1px;
  }
  .month-grid-full .dh { text-align: center; font-size: 9px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-muted); padding: 4px 0 3px; }
  .month-grid-full .dc { min-height: 50px; }
  .month-grid-full .dn { font-size: 11px; }
  .ce { background: transparent; border-color: transparent; }

  .month-gap { height: 10px; }

  /* ── Today button (full cal zone) ── */
  #today-btn {
    position: fixed;
    bottom: 16px; right: 12px;
    background: var(--today-ring);
    color: #fff;
    border: none;
    border-radius: 20px;
    padding: 7px 14px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.04em;
    cursor: pointer;
    box-shadow: 0 2px 12px rgba(232,51,10,0.4);
    opacity: 0;
    transition: opacity 0.25s;
    z-index: 100;
  }
  #today-btn.visible { opacity: 1; }
</style>
</head>
<body>

<!-- ============== WIDGET ZONE (captured by WebsiteWidget on 4x6) ============== -->
<div id="widget-zone">
  <div class="widget-header">
    <span class="wh-title">FIFO Roster</span>
    <span class="wh-crew" id="crew-badge"></span>
  </div>
  <div id="rolling-weeks"></div>
  <div id="countdown-banner">
    <span class="cd-icon" id="cd-icon"></span>
    <div class="cd-main">
      <div class="cd-count">
        <span class="cd-days" id="cd-days"></span>
        <span class="cd-unit" id="cd-unit"></span>
      </div>
      <div class="cd-label" id="cd-label"></div>
    </div>
  </div>
</div>

<!-- ============== DIVIDER (not normally visible in widget crop) ============== -->
<div id="scroll-divider">
  <div class="sd-label">↓ Scroll for full calendar ↓</div>
</div>

<!-- ============== FULL CALENDAR ZONE (tap widget to see this) ============== -->
<div id="full-cal-zone">
  <div class="legend">
    <div class="leg"><div class="ldot" style="background:var(--work-accent)"></div>Working</div>
    <div class="leg"><div class="ldot" style="background:var(--travel-accent)"></div>Travel</div>
    <div class="leg"><div class="ldot" style="background:var(--off-bg);border:1px solid var(--bg-border)"></div>Days Off</div>
    <div class="leg"><div class="ldot" style="background:var(--ph-color)"></div>Public Hol</div>
    <div class="leg"><div class="ldot" style="background:var(--bday-color)"></div>Birthday</div>
    <div class="leg"><div class="ldot" style="background:var(--sport-color)"></div>Sport</div>
  </div>
  <div id="wrap"></div>
</div>

<button id="today-btn" onclick="scrollToToday()">↑ Today</button>

<script>
// =============================================================================
// SECTION 1 — ROSTER ANCHOR DATE
// =============================================================================
const ANCHOR = new Date(2026, 6, 7); // 7 July 2026 = Crew A Day 1

// =============================================================================
// CREW ASSIGNMENT — change 'A' to 'B' if Luke moves to Crew B
// =============================================================================
const MY_CREW = 'B';

// =============================================================================
// SECTION 2 — QUEENSLAND PUBLIC HOLIDAYS
// =============================================================================
const PUBLIC_HOLIDAYS = {
  "2026-04-03": "Good Friday", "2026-04-04": "Easter Sat", "2026-04-05": "Easter Sun",
  "2026-04-06": "Easter Mon", "2026-04-25": "ANZAC Day", "2026-05-04": "Labour Day",
  "2026-08-12": "Ekka (Bris)", "2026-10-05": "King's B'day", "2026-12-25": "Christmas Day",
  "2026-12-26": "Boxing Day", "2026-12-28": "Boxing Day+",
  "2027-01-01": "New Year's Day", "2027-01-26": "Australia Day", "2027-03-26": "Good Friday",
  "2027-03-27": "Easter Sat", "2027-03-28": "Easter Sun", "2027-03-29": "Easter Mon",
  "2027-04-26": "ANZAC Day obs.", "2027-05-03": "Labour Day", "2027-08-11": "Ekka (Bris)",
  "2027-10-04": "King's B'day", "2027-12-24": "Xmas Eve 6pm", "2027-12-25": "Christmas Day",
  "2027-12-26": "Boxing Day", "2027-12-27": "Xmas Day+", "2027-12-28": "Boxing Day+",
  "2028-01-01": "New Year's Day", "2028-01-03": "New Year+", "2028-01-26": "Australia Day",
  "2028-04-14": "Good Friday", "2028-04-15": "Easter Sat", "2028-04-16": "Easter Sun",
  "2028-04-17": "Easter Mon", "2028-04-25": "ANZAC Day", "2028-05-01": "Labour Day",
  "2028-08-16": "Ekka (Bris)", "2028-10-02": "King's B'day", "2028-12-24": "Xmas Eve 6pm",
  "2028-12-25": "Christmas Day", "2028-12-26": "Boxing Day",
  // --- ADD 2029 BELOW when published ---
};

// =============================================================================
// SECTION 3 — FAMILY BIRTHDAYS
// =============================================================================
const BIRTHDAYS = {
  "01-16": "Luke", "01-17": "Adriana", "02-20": "Michael", "03-01": "Mum",
  "04-22": "Dad", "08-17": "Steph", "08-18": "Stefaniya", "11-14": "David", "12-20": "Kayleen",
};

// =============================================================================
// SECTION 4 — SPORTS & SPECIAL EVENTS
// =============================================================================
const SPORTS = {
  "2026-09-26": "AFL GF 2026", "2026-10-04": "NRL GF 2026",
  "2027-02-14": "Super Bowl LXI", "2027-05-30": "PL Final Day",
};

// =============================================================================
// SECTION 5 — WIDGET & RANGE SETTINGS
// =============================================================================
const ROLLING_WEEKS = 4;       // weeks shown in widget zone
const WIDGET_WEEK_START = 0;   // 0 = Sunday, 1 = Monday
const MIN = { y: 2026, m: 5 };  // June 2026 (full calendar start)
const MAX = { y: 2028, m: 11 }; // December 2028 (full calendar end)

// =============================================================================
// SHARED LOGIC
// =============================================================================
const MONTHS = ['January','February','March','April','May','June','July',
                'August','September','October','November','December'];
const DAYS_SUN = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function dateKey(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function mdKey(d)   { return `${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function getPos(date) {
  const d = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  if (d < ANCHOR) return -1;
  return Math.round((d - ANCHOR) / 86400000) % 14;
}
function myStatus(date) {
  const pos = getPos(date);
  if (pos === -1) return null;
  if (MY_CREW === 'A') {
    if (pos === 0 || pos === 7) return 'travel';
    if (pos >= 1 && pos <= 6)  return 'work';
    return 'off';
  } else {
    if (pos === 7 || pos === 0) return 'travel';
    if (pos >= 8 && pos <= 13) return 'work';
    return 'off';
  }
}
function workDayNum(date) {
  const pos = getPos(date);
  if (MY_CREW === 'A') {
    if (pos === 0) return 1;
    if (pos >= 1 && pos <= 6) return pos + 1;
    if (pos === 7) return 8;
  } else {
    if (pos === 7) return 1;
    if (pos >= 8 && pos <= 13) return pos - 6;
    if (pos === 0) return 8;
  }
  return null;
}

function dayCellHTML(date, today) {
  const status  = myStatus(date);
  const isToday = date.toDateString() === today.toDateString();
  const dk = dateKey(date), mk = mdKey(date);
  const ph = PUBLIC_HOLIDAYS[dk], bd = BIRTHDAYS[mk], sp = SPORTS[dk];

  let cellCls = 'cpre', pills = '';
  if (status === 'travel') {
    cellCls = 'ctravel';
    pills += `<span class="pill pill-travel">✈ D${workDayNum(date)}</span>`;
  } else if (status === 'work') {
    cellCls = 'cwork';
    pills += `<span class="pill pill-work">Day ${workDayNum(date)}</span>`;
  } else if (status === 'off') {
    cellCls = 'coff';
  }
  if (ph) pills += `<span class="pill pill-ph">${ph.length > 10 ? ph.substring(0,10)+'…' : ph}</span>`;
  if (bd) pills += `<span class="pill pill-bday">🎂${bd}</span>`;
  if (sp) pills += `<span class="pill pill-sport">${sp}</span>`;

  const todayId  = isToday ? ' id="today-cell"' : '';
  const todayCls = isToday ? ' today-cell' : '';
  return `<div class="dc ${cellCls}${todayCls}"${todayId}><div class="dn">${date.getDate()}</div>${pills}</div>`;
}

// =============================================================================
// ROLLING WEEKS (widget zone)
// =============================================================================
function buildRollingWeeks() {
  const today = new Date();
  today.setHours(0,0,0,0);

  // Find the start of "this week" based on WIDGET_WEEK_START
  const dow = today.getDay(); // 0=Sun
  const offsetToWeekStart = (dow - WIDGET_WEEK_START + 7) % 7;
  const weekStart = new Date(today);
  weekStart.setDate(today.getDate() - offsetToWeekStart);

  let html = `<div class="dh-row">`;
  for (let i = 0; i < 7; i++) {
    const dIdx = (WIDGET_WEEK_START + i) % 7;
    html += `<div class="dh">${DAYS_SUN[dIdx]}</div>`;
  }
  html += `</div>`;

  for (let w = 0; w < ROLLING_WEEKS; w++) {
    html += `<div class="week-row"><div class="week-grid">`;
    for (let d = 0; d < 7; d++) {
      const date = new Date(weekStart);
      date.setDate(weekStart.getDate() + (w * 7) + d);
      html += dayCellHTML(date, today);
    }
    html += `</div></div>`;
  }
  document.getElementById('rolling-weeks').innerHTML = html;
}

// =============================================================================
// FULL CALENDAR (scrollable zone)
// =============================================================================
function buildMonth(year, month) {
  const first = new Date(year, month, 1);
  const last  = new Date(year, month + 1, 0);
  const today = new Date();
  const isCurrentMonth = year === today.getFullYear() && month === today.getMonth();

  let html = `<div class="month-block" id="m-${year}-${month}">
    <div class="month-sticky"><div class="month-title">
      ${isCurrentMonth ? '<span class="current-dot"></span>' : ''}
      <span>${MONTHS[month]} ${year}</span>
      ${isCurrentMonth ? '<span class="current-dot"></span>' : ''}
    </div></div>
    <div class="month-grid-full">`;

  DAYS_SUN.forEach(d => { html += `<div class="dh">${d}</div>`; });
  for (let i = 0; i < first.getDay(); i++) html += `<div class="dc ce"></div>`;
  for (let d = 1; d <= last.getDate(); d++) {
    html += dayCellHTML(new Date(year, month, d), today);
  }
  html += `</div><div class="month-gap"></div></div>`;
  return html;
}

const wrap = document.getElementById('wrap');
let fullHtml = '', y = MIN.y, mo = MIN.m;
while (y < MAX.y || (y === MAX.y && mo <= MAX.m)) {
  fullHtml += buildMonth(y, mo);
  if (++mo > 11) { mo = 0; y++; }
}
wrap.innerHTML = fullHtml;

// =============================================================================
// COUNTDOWN BANNER
// =============================================================================
function updateCountdown() {
  const today = new Date();
  today.setHours(0,0,0,0);
  const diff = Math.round((today - ANCHOR) / 86400000);
  const banner = document.getElementById('countdown-banner');
  const icon = document.getElementById('cd-icon'), days = document.getElementById('cd-days'),
        unit = document.getElementById('cd-unit'), label = document.getElementById('cd-label');

  if (diff < 0) {
    const n = Math.abs(diff) - 1;
    banner.className = 'pre-roster';
    icon.textContent = '📅'; days.textContent = n; unit.textContent = n === 1 ? 'day' : 'days';
    label.textContent = 'until roster starts — 7 Jul';
    return;
  }

  const pos = diff % 14;
  let state, daysLeft;
  if (MY_CREW === 'A') {
    if (pos === 0)                  { state = 'travel-start'; daysLeft = 7; }
    else if (pos >= 1 && pos <= 6) { state = 'swing';        daysLeft = 7 - pos; }
    else if (pos === 7)             { state = 'travel-end';   daysLeft = 0; }
    else                            { state = 'break';        daysLeft = 14 - pos; }
  } else {
    if (pos === 7)                  { state = 'travel-start'; daysLeft = 7; }
    else if (pos >= 8 && pos <= 13){ state = 'swing';        daysLeft = 14 - pos; }
    else if (pos === 0)             { state = 'travel-end';   daysLeft = 0; }
    else                            { state = 'break';        daysLeft = 7 - pos; }
  }

  if (state === 'travel-end') {
    banner.className = 'on-travel'; icon.textContent = '✈️';
    days.textContent = 'Last'; unit.textContent = 'day';
    label.textContent = 'handover & travel home today';
  } else if (state === 'travel-start') {
    banner.className = 'on-travel'; icon.textContent = '✈️';
    days.textContent = 'First'; unit.textContent = 'day';
    label.textContent = `travel in — ${daysLeft} days left on swing`;
  } else if (state === 'swing') {
    banner.className = 'on-swing'; icon.textContent = '⛏️';
    days.textContent = daysLeft; unit.textContent = daysLeft === 1 ? 'day' : 'days';
    label.textContent = 'until end of swing';
  } else {
    banner.className = 'on-break'; icon.textContent = '🏖️';
    days.textContent = daysLeft; unit.textContent = daysLeft === 1 ? 'day' : 'days';
    label.textContent = 'until end of break';
  }
}

document.getElementById('crew-badge').textContent = `Crew ${MY_CREW}`;
buildRollingWeeks();
updateCountdown();

// Auto-scroll to current month in the full calendar zone (when tapped into browser)
function scrollToToday() {
  const el = document.getElementById('today-cell');
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  document.getElementById('today-btn').classList.remove('visible');
}

window.addEventListener('scroll', () => {
  const cells = document.querySelectorAll('#today-cell');
  if (cells.length < 2) { document.getElementById('today-btn').classList.remove('visible'); return; }
  const fullCalCell = cells[1]; // second one is in the full calendar zone
  const r = fullCalCell.getBoundingClientRect();
  document.getElementById('today-btn').classList.toggle('visible', r.bottom < 0 || r.top > window.innerHeight);
});
</script>
