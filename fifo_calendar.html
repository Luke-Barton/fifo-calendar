<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FIFO Roster Calendar</title>

<!--
=============================================================================
  FIFO ROSTER CALENDAR — QUICK EDIT GUIDE
  Created with Claude (claude.ai) — June 2026
=============================================================================

  HOW THIS FILE WORKS:
  - Hosted on GitHub Pages, displayed via WebsiteWidget on Samsung S22 Ultra
  - Auto-scrolls to the CURRENT MONTH when opened
  - Swipe/scroll UP and DOWN to see other months
  - All months from July 2026 to December 2028 are in the page
  - WebsiteWidget refreshes once per day — month updates automatically

  TO EDIT ON GITHUB:
  - Go to github.com → your repository → fifo_calendar.html
  - Click the pencil (edit) icon
  - Find the section you want to change (labelled clearly below)
  - Click "Commit changes" — live within a minute or two

=============================================================================
  SECTION 1 — ROSTER ANCHOR DATE
=============================================================================
  The ANCHOR is Crew A's very first day (Tuesday 7 July 2026).
  Only change this if the entire roster is reset from a new start date.

  Format: new Date(YEAR, MONTH-1, DAY)  <-- month is 0-indexed!
    new Date(2026, 6, 7)  = 7 July 2026   (6 = July)
    new Date(2027, 0, 1)  = 1 Jan 2027    (0 = January)

  SCHEDULE LOGIC (8 on / 6 off, Tuesdays always handover):
  - Crew A: Tue D1 → Wed → Thu → Fri → Sat → Sun → Mon → Tue D8 (handover)
  - Crew B picks up from that Tuesday, same 8-day pattern
  - After 8 days: 6 days OFF (Wed–Mon). Full cycle = 14 days.
=============================================================================

=============================================================================
  SECTION 2 — QUEENSLAND PUBLIC HOLIDAYS
=============================================================================
  Format: "YYYY-MM-DD": "Holiday Name",
  Source: https://www.queenslandpublicholidays.com.au/
  Add new years when published (usually Nov/Dec of the previous year).
  Ekka is Brisbane-only — delete those lines if not in Brisbane.
=============================================================================

=============================================================================
  SECTION 3 — FAMILY BIRTHDAYS
=============================================================================
  Format: "MM-DD": "Name",
  Repeat every year automatically. Zero-padded: "01-16" = 16 Jan.

  CURRENT LIST:
    01-16 Luke      01-17 Adriana   02-20 Michael   03-01 Mum
    04-22 Dad       08-17 Steph     08-18 Stefaniya  11-14 David
    12-20 Kayleen
=============================================================================

=============================================================================
  SECTION 4 — SPORTS & SPECIAL EVENTS
=============================================================================
  Format: "YYYY-MM-DD": "Short Label",
  Add new confirmed dates as announced. Keep old ones — don't replace.
  Sources:
    AFL Grand Final  → afl.com.au        (confirmed: 26 Sep 2026)
    NRL Grand Final  → nrl.com           (confirmed: 4 Oct 2026)
    Super Bowl LXI   → nfl.com           (confirmed: 14 Feb 2027)
    Premier League   → premierleague.com (confirmed: 30 May 2027)
    Super Bowl LXII  → nfl.com           (Feb 13 2028, Atlanta — not yet confirmed)
=============================================================================

=============================================================================
  SECTION 5 — DISPLAY & RANGE SETTINGS
=============================================================================
  Cell height:  --cell-height  (reduce if calendar is too tall on screen)
  Bar font:     --font-bar     (increase if labels are too small)
  Day number:   --font-day
  Day headers:  --font-header  (Sun/Mon/Tue etc)

  CALENDAR RANGE: July 2026 → December 2028
  TO EXTEND: find "const MAX" in the script and change { y: YEAR, m: MONTH }
  Month index: Jan=0 Feb=1 Mar=2 Apr=3 May=4 Jun=5
               Jul=6 Aug=7 Sep=8 Oct=9 Nov=10 Dec=11
=============================================================================
-->

<style>
  :root {
    --cell-height: 58px;
    --font-bar: 8px;
    --font-day: 10px;
    --font-header: 10px;
    --crew-a-bg: #E6F1FB;
    --crew-a-border: #B5D4F4;
    --crew-a-text: #0C447C;
    --crew-a-bar: #185FA5;
    --crew-b-bg: #EAF3DE;
    --crew-b-border: #C0DD97;
    --crew-b-text: #27500A;
    --crew-b-bar: #3B6D11;
    --handover-bg: #FAEEDA;
    --handover-border: #FAC775;
    --handover-text: #412402;
    --handover-bar: #BA7517;
    --ph-bar: #993556;
    --bday-bar: #534AB7;
    --sport-bar: #0F6E56;
    --today-outline: #D85A30;
    --off-bg: #3a3a3a;
    --off-text: #888;
    --page-bg: #1a1a1a;
    --surface: #2a2a2a;
    --text-primary: #f0f0f0;
    --text-muted: #999;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--page-bg);
    color: var(--text-primary);
    font-family: system-ui, sans-serif;
    /* Smooth scrolling for swipe navigation */
    scroll-behavior: smooth;
  }

  .wrap { padding: 6px 4px 20px; max-width: 420px; margin: 0 auto; }

  /* Sticky legend + month title at top of each month block */
  .month-block { margin-bottom: 20px; }

  .month-sticky {
    position: sticky;
    top: 0;
    background: var(--page-bg);
    z-index: 10;
    padding: 6px 0 4px;
    border-bottom: 1px solid #333;
    margin-bottom: 5px;
  }

  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 5px;
  }

  /* Only show legend on first month block */
  .month-block:not(:first-child) .legend { display: none; }

  .leg { display: flex; align-items: center; gap: 3px; font-size: 10px; color: var(--text-muted); }
  .ldot { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }

  .month-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    text-align: center;
    letter-spacing: 0.3px;
  }

  /* Swipe hint */
  .swipe-hint {
    text-align: center;
    font-size: 10px;
    color: var(--text-muted);
    margin-bottom: 8px;
    opacity: 0.7;
  }

  .month-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .dh { text-align: center; font-size: var(--font-header); color: var(--text-muted); padding: 2px 0; font-weight: 500; }
  .dc { min-height: var(--cell-height); border-radius: 4px; padding: 3px 2px; border: 0.5px solid transparent; }
  .dn { font-size: var(--font-day); font-weight: 500; margin-bottom: 1px; }
  .bar { font-size: var(--font-bar); font-weight: 500; border-radius: 2px; padding: 1px 2px; margin-top: 1px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; }

  .today-cell { outline: 1.5px solid var(--today-outline); outline-offset: -1px; }

  .ca { background: var(--crew-a-bg); border-color: var(--crew-a-border); }
  .ca .dn { color: var(--crew-a-text); }
  .cb { background: var(--crew-b-bg); border-color: var(--crew-b-border); }
  .cb .dn { color: var(--crew-b-text); }
  .ch { background: var(--handover-bg); border-color: var(--handover-border); }
  .ch .dn { color: var(--handover-text); }
  .cn { background: var(--surface); }
  .cn .dn { color: var(--text-primary); }
  .ce { background: transparent; border-color: transparent; }

  .ba  { background: var(--crew-a-bar); }
  .bb  { background: var(--crew-b-bar); }
  .bh  { background: var(--handover-bar); }
  .bph { background: var(--ph-bar); }
  .bbday { background: var(--bday-bar); }
  .bsport { background: var(--sport-bar); }
  .boff { background: var(--off-bg); color: var(--off-text) !important; }

  /* Month divider */
  .month-divider {
    height: 1px;
    background: #333;
    margin: 4px 0 16px;
  }

  /* Back-to-today button */
  #today-btn {
    position: fixed;
    bottom: 16px;
    right: 12px;
    background: var(--today-outline);
    color: #fff;
    border: none;
    border-radius: 20px;
    padding: 6px 12px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 100;
  }
  #today-btn.visible { opacity: 1; }
</style>
</head>
<body>
<div class="wrap" id="wrap"></div>
<button id="today-btn" onclick="scrollToToday()">↑ Today</button>

<script>
// =============================================================================
// SECTION 1 — ROSTER ANCHOR DATE
// =============================================================================
const ANCHOR = new Date(2026, 6, 7); // 7 July 2026 = Crew A Day 1

// =============================================================================
// SECTION 2 — QUEENSLAND PUBLIC HOLIDAYS
// =============================================================================
const PUBLIC_HOLIDAYS = {
  // --- 2026 ---
  "2026-04-03": "Good Friday",
  "2026-04-04": "Easter Sat",
  "2026-04-05": "Easter Sun",
  "2026-04-06": "Easter Mon",
  "2026-04-25": "ANZAC Day",
  "2026-05-04": "Labour Day",
  "2026-08-12": "Ekka (Bris)",
  "2026-10-05": "King's B'day",
  "2026-12-25": "Christmas Day",
  "2026-12-26": "Boxing Day",
  "2026-12-28": "Boxing Day+",
  // --- 2027 ---
  "2027-01-01": "New Year's Day",
  "2027-01-26": "Australia Day",
  "2027-03-26": "Good Friday",
  "2027-03-27": "Easter Sat",
  "2027-03-28": "Easter Sun",
  "2027-03-29": "Easter Mon",
  "2027-04-26": "ANZAC Day obs.",
  "2027-05-03": "Labour Day",
  "2027-08-11": "Ekka (Bris)",
  "2027-10-04": "King's B'day",
  "2027-12-24": "Xmas Eve 6pm",
  "2027-12-25": "Christmas Day",
  "2027-12-26": "Boxing Day",
  "2027-12-27": "Xmas Day+",
  "2027-12-28": "Boxing Day+",
  // --- 2028 ---
  "2028-01-01": "New Year's Day",
  "2028-01-03": "New Year+",
  "2028-01-26": "Australia Day",
  "2028-04-14": "Good Friday",
  "2028-04-15": "Easter Sat",
  "2028-04-16": "Easter Sun",
  "2028-04-17": "Easter Mon",
  "2028-04-25": "ANZAC Day",
  "2028-05-01": "Labour Day",
  "2028-08-16": "Ekka (Bris)",
  "2028-10-02": "King's B'day",
  "2028-12-24": "Xmas Eve 6pm",
  "2028-12-25": "Christmas Day",
  "2028-12-26": "Boxing Day",
  // --- ADD 2029 BELOW when published (usually Nov/Dec 2028) ---
  // Source: https://www.queenslandpublicholidays.com.au/
};

// =============================================================================
// SECTION 3 — FAMILY BIRTHDAYS (repeat every year automatically)
// =============================================================================
const BIRTHDAYS = {
  "01-16": "Luke",
  "01-17": "Adriana",
  "02-20": "Michael",
  "03-01": "Mum",
  "04-22": "Dad",
  "08-17": "Steph",
  "08-18": "Stefaniya",
  "11-14": "David",
  "12-20": "Kayleen",
  // Add more: "MM-DD": "Name",
};

// =============================================================================
// SECTION 4 — SPORTS & SPECIAL EVENTS (confirmed dates only)
// =============================================================================
const SPORTS = {
  "2026-09-26": "AFL GF 2026",
  "2026-10-04": "NRL GF 2026",
  "2027-02-14": "Super Bowl LXI",
  "2027-05-30": "PL Final Day",
  // Add confirmed future dates below:
  // "2028-02-13": "Super Bowl LXII",
};

// =============================================================================
// SECTION 5 — CALENDAR RANGE
// MIN = first month, MAX = last month
// Month index: Jan=0, Feb=1, ... Dec=11
// =============================================================================
const MIN = { y: 2026, m: 5 };  // June 2026
const MAX = { y: 2028, m: 11 }; // December 2028

// =============================================================================
// CALENDAR LOGIC — no need to edit below here
// =============================================================================
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function mdKey(d) {
  return `${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function crewStatus(date) {
  const d = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  if (d < ANCHOR) return null;
  const diff = Math.round((d - ANCHOR) / 86400000);
  const pos = diff % 14;
  if (pos === 0 || pos === 7) return 'handover';
  if (pos >= 1 && pos <= 6) return 'A';
  return 'B';
}
function crewDay(date) {
  const diff = Math.round((new Date(date.getFullYear(), date.getMonth(), date.getDate()) - ANCHOR) / 86400000);
  const pos = diff % 14;
  if (pos === 0) return { type: 'handover', aDay: 1, bDay: 8 };
  if (pos === 7) return { type: 'handover', aDay: 8, bDay: 1 };
  if (pos >= 1 && pos <= 6) return { type: 'A', aDay: pos + 1, bOff: pos };
  return { type: 'B', bDay: pos - 6, aOff: pos - 7 };
}

function buildMonth(year, month, isFirst) {
  const first = new Date(year, month, 1);
  const last = new Date(year, month + 1, 0);
  const today = new Date();
  const isCurrentMonth = year === today.getFullYear() && month === today.getMonth();

  let html = `<div class="month-block" id="m-${year}-${month}">
    <div class="month-sticky">`;

  // Legend only on first block
  if (isFirst) {
    html += `<div class="legend">
      <div class="leg"><div class="ldot" style="background:var(--crew-a-bar)"></div>Crew A</div>
      <div class="leg"><div class="ldot" style="background:var(--crew-b-bar)"></div>Crew B</div>
      <div class="leg"><div class="ldot" style="background:var(--handover-bar)"></div>Handover</div>
      <div class="leg"><div class="ldot" style="background:var(--ph-bar)"></div>Public Hol</div>
      <div class="leg"><div class="ldot" style="background:var(--bday-bar)"></div>Birthday</div>
      <div class="leg"><div class="ldot" style="background:var(--sport-bar)"></div>Sport</div>
    </div>`;
  }

  html += `<div class="month-title">${MONTHS[month]} ${year}${isCurrentMonth ? ' ◉' : ''}</div>
    </div>`;

  // Day headers
  html += `<div class="month-grid">`;
  DAYS.forEach(d => { html += `<div class="dh">${d}</div>`; });

  // Empty cells before first day
  for (let i = 0; i < first.getDay(); i++) {
    html += `<div class="dc ce"><div class="dn"> </div></div>`;
  }

  // Day cells
  for (let d = 1; d <= last.getDate(); d++) {
    const date = new Date(year, month, d);
    const status = crewStatus(date);
    const isToday = date.toDateString() === today.toDateString();
    const dk = dateKey(date);
    const mk = mdKey(date);
    const ph = PUBLIC_HOLIDAYS[dk];
    const bd = BIRTHDAYS[mk];
    const sp = SPORTS[dk];
    const cd = status ? crewDay(date) : null;

    let cellCls = !status ? 'ce' : status === 'handover' ? 'ch' : status === 'A' ? 'ca' : 'cb';
    let bars = '';

    if (status) {
      if (status === 'handover') {
        bars += `<div class="bar bh">A D${cd.aDay}+B D${cd.bDay}</div>`;
      } else if (status === 'A') {
        bars += `<div class="bar ba">A day ${cd.aDay}</div>`;
        bars += `<div class="bar boff">B off d${cd.bOff}</div>`;
      } else {
        bars += `<div class="bar bb">B day ${cd.bDay}</div>`;
        bars += `<div class="bar boff">A off d${cd.aOff}</div>`;
      }
    }
    if (ph) bars += `<div class="bar bph">${ph.length > 12 ? ph.substring(0,12)+'…' : ph}</div>`;
    if (bd)  bars += `<div class="bar bbday">🎂 ${bd}</div>`;
    if (sp)  bars += `<div class="bar bsport">${sp}</div>`;

    const todayId = isToday ? ' id="today-cell"' : '';
    html += `<div class="dc ${cellCls}${isToday ? ' today-cell' : ''}"${todayId}>
      <div class="dn">${d}</div>${bars}
    </div>`;
  }

  html += `</div></div>`; // close grid + month-block
  return html;
}

// Build all months
const wrap = document.getElementById('wrap');
let html = '';
let y = MIN.y, m = MIN.m;
let isFirst = true;
while (y < MAX.y || (y === MAX.y && m <= MAX.m)) {
  html += buildMonth(y, m, isFirst);
  isFirst = false;
  m++;
  if (m > 11) { m = 0; y++; }
}
wrap.innerHTML = html;

// Auto-scroll to current month
function scrollToToday() {
  const el = document.getElementById('today-cell') || document.querySelector('[id^="m-"]');
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  document.getElementById('today-btn').classList.remove('visible');
}

// Small delay to let page render before scrolling
setTimeout(() => {
  const today = new Date();
  const monthEl = document.getElementById(`m-${today.getFullYear()}-${today.getMonth()}`);
  if (monthEl) monthEl.scrollIntoView({ behavior: 'auto', block: 'start' });
}, 100);

// Show "Today" button when user scrolls away from current month
window.addEventListener('scroll', () => {
  const todayCell = document.getElementById('today-cell');
  if (!todayCell) return;
  const rect = todayCell.getBoundingClientRect();
  const inView = rect.top >= 0 && rect.bottom <= window.innerHeight;
  document.getElementById('today-btn').classList.toggle('visible', !inView);
});
</script>
</body>
</html>
