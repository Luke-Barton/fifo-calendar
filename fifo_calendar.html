<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FIFO Roster — Luke Barton</title>

<!--
=============================================================================
  FIFO ROSTER CALENDAR — QUICK EDIT GUIDE
  Created with Claude (claude.ai) — June 2026
  Owner: Luke Barton
=============================================================================

  HOW THIS FILE WORKS:
  - Hosted on GitHub Pages, displayed via WebsiteWidget on Samsung S22 Ultra
  - Auto-scrolls to the CURRENT MONTH when opened
  - Swipe/scroll UP and DOWN to see other months
  - Floating banner at the bottom counts down days until swing ends or break ends
  - WebsiteWidget refreshes once per day — updates automatically

  TO EDIT ON GITHUB:
  - Go to github.com → your repository → fifo_calendar.html
  - Click the pencil (edit) icon
  - Find the section you want to change (labelled clearly below)
  - Click "Commit changes" — live within a minute or two

=============================================================================
  !! IMPORTANT — CREW ASSIGNMENT !!
=============================================================================
  At the time this calendar was created, Luke was UNSURE which crew he would
  be assigned to. The calendar is currently set to CREW A.

  IF YOU NEED TO SWITCH TO CREW B — make ONE change:
    Find "const MY_CREW = 'A';" below and change to: const MY_CREW = 'B';
  That single change updates the entire calendar and countdown automatically.

  SCHEDULE LOGIC (same for both crews, just offset by 7 days):
  - ANCHOR date = Tuesday 7 July 2026 = Crew A Day 1
  - Every Tuesday = handover/travel day (shown as Travel Day)
  - Crew A: Tue D1 → Wed-Mon working → Tue D8 (handover) → 6 days off
  - Crew B: starts on that same Tue D8, works Wed-Mon → Tue handover → 6 days off
  - Full cycle = 14 days
  - Crew A working: cycle positions 0 (Tue D1), 1-6 (Wed-Mon), 7 (Tue D8)
  - Crew B working: cycle positions 7 (Tue D1), 8-13 (Wed-Mon), 0 (Tue D8)

  IF UPLOADING THIS FILE TO A NEW CLAUDE CHAT FOR HELP:
  - Tell Claude: "I am on Crew A (or B), ANCHOR is 7 July 2026, cycle is 14 days"
  - MY_CREW variable controls what is shown on the calendar and countdown banner
  - The myStatus() function returns 'travel', 'work', 'off', or null (pre-roster)

=============================================================================
  SECTION 1 — ROSTER ANCHOR DATE
=============================================================================
  The ANCHOR is Crew A's very first day (Tuesday 7 July 2026).
  Only change this if the entire roster is reset from a new start date.
  Format: new Date(YEAR, MONTH-1, DAY)  <-- month is 0-indexed!
=============================================================================

=============================================================================
  SECTION 2 — QUEENSLAND PUBLIC HOLIDAYS
=============================================================================
  Format: "YYYY-MM-DD": "Holiday Name",
  Source: https://www.queenslandpublicholidays.com.au/
  Add new years when published (usually Nov/Dec of the previous year).
  Ekka is Brisbane-only — delete those lines if not in Brisbane.
=============================================================================

=============================================================================
  SECTION 3 — FAMILY BIRTHDAYS
=============================================================================
  Format: "MM-DD": "Name",
  Repeat every year automatically. Zero-padded: "01-16" = 16 Jan.
  CURRENT: Luke 01-16, Adriana 01-17, Michael 02-20, Mum 03-01,
           Dad 04-22, Steph 08-17, Stefaniya 08-18, David 11-14, Kayleen 12-20
=============================================================================

=============================================================================
  SECTION 4 — SPORTS & SPECIAL EVENTS
=============================================================================
  Format: "YYYY-MM-DD": "Short Label",
  Add new confirmed dates as announced. Keep old ones — don't replace.
  Sources: afl.com.au / nrl.com / nfl.com / premierleague.com
=============================================================================

=============================================================================
  SECTION 5 — DISPLAY & RANGE SETTINGS
=============================================================================
  CALENDAR RANGE: June 2026 → December 2028
  TO EXTEND: find "const MAX" and change { y: YEAR, m: MONTH_INDEX }
  Month index: Jan=0 Feb=1 Mar=2 Apr=3 May=4 Jun=5
               Jul=6 Aug=7 Sep=8 Oct=9 Nov=10 Dec=11
=============================================================================
-->

<style>
  /* =====================================================================
     DESIGN TOKENS — Dark & Sleek, Premium FIFO Calendar
     ===================================================================== */
  :root {
    /* Background layers */
    --bg-base:       #0D0F14;
    --bg-surface:    #13161E;
    --bg-raised:     #1A1E2A;
    --bg-border:     #252A38;

    /* Working day — steel blue */
    --work-from:     #1A3A6B;
    --work-to:       #1E4D8C;
    --work-accent:   #3B82D4;
    --work-text:     #93C5FD;
    --work-num:      #BFDBFE;

    /* Travel day — amber dust */
    --travel-from:   #4A2C00;
    --travel-to:     #6B3D00;
    --travel-accent: #D97706;
    --travel-text:   #FCD34D;
    --travel-num:    #FDE68A;

    /* Off day */
    --off-bg:        #13161E;
    --off-num:       #3A3F52;

    /* Pre-roster */
    --pre-num:       #252A38;

    /* Accents */
    --today-ring:    #E8340A;
    --ph-color:      #9F4576;
    --bday-color:    #6D5FD8;
    --sport-color:   #0E7A56;
    --green-accent:  #1DB854;
    --red-accent:    #E8340A;

    /* Text */
    --text-primary:  #E8ECF4;
    --text-secondary:#8A90A8;
    --text-muted:    #454C64;

    /* Typography */
    --font-main: system-ui, -apple-system, sans-serif;
    --font-mono: ui-monospace, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }

  html, body {
    background: var(--bg-base);
    color: var(--text-primary);
    font-family: var(--font-main);
    scroll-behavior: smooth;
    min-height: 100vh;
  }

  /* ── Page wrapper ── */
  .wrap {
    padding: 0 3px 110px;
    max-width: 430px;
    margin: 0 auto;
  }

  /* ── Page header (first month only) ── */
  .page-header {
    padding: 18px 8px 12px;
    text-align: center;
    border-bottom: 1px solid var(--bg-border);
    margin-bottom: 4px;
  }
  .page-header .title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .page-header .subtitle {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text-primary);
    line-height: 1.1;
  }
  .page-header .crew-badge {
    display: inline-block;
    margin-top: 8px;
    background: linear-gradient(135deg, var(--work-from), var(--work-to));
    border: 1px solid var(--work-accent);
    color: var(--work-text);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 20px;
  }

  /* ── Legend ── */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 8px 12px;
    padding: 10px 6px 8px;
    border-bottom: 1px solid var(--bg-border);
    margin-bottom: 4px;
  }
  .leg {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    font-weight: 500;
    color: var(--text-secondary);
    letter-spacing: 0.02em;
  }
  .ldot {
    width: 10px;
    height: 10px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  /* ── Month block ── */
  .month-block { margin-bottom: 6px; }

  /* Sticky month header */
  .month-sticky {
    position: sticky;
    top: 0;
    z-index: 20;
    background: var(--bg-base);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 8px 6px 6px;
    border-bottom: 1px solid var(--bg-border);
    margin-bottom: 3px;
  }
  .month-title {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .month-title .current-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--today-ring);
    box-shadow: 0 0 6px var(--today-ring);
    flex-shrink: 0;
  }
  .month-title .spacer { width: 7px; }

  /* ── Day grid ── */
  .month-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    padding: 0 1px;
  }

  /* Day headers */
  .dh {
    text-align: center;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 4px 0 3px;
  }

  /* ── Day cells ── */
  .dc {
    min-height: 54px;
    border-radius: 6px;
    padding: 4px 3px 3px;
    border: 1px solid transparent;
    position: relative;
    overflow: hidden;
  }
  .dn {
    font-size: 11px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 3px;
    font-variant-numeric: tabular-nums;
  }

  /* Pill labels */
  .pill {
    display: block;
    font-size: 7.5px;
    font-weight: 700;
    letter-spacing: 0.04em;
    border-radius: 3px;
    padding: 1.5px 3px;
    margin-top: 2px;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.3;
  }

  /* Today ring */
  .today-cell {
    box-shadow: 0 0 0 1.5px var(--today-ring), 0 0 8px rgba(232,51,10,0.3);
  }
  .today-cell .dn { color: var(--today-ring) !important; }

  /* ── Cell types ── */

  /* Working day — gradient + glint signature effect */
  .cwork {
    background: linear-gradient(160deg, var(--work-from) 0%, var(--work-to) 100%);
    border-color: rgba(59,130,212,0.25);
  }
  .cwork::before {
    content: '';
    position: absolute;
    top: 0; left: -30%;
    width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
    pointer-events: none;
  }
  .cwork .dn { color: var(--work-num); }

  /* Travel/handover day */
  .ctravel {
    background: linear-gradient(160deg, var(--travel-from) 0%, var(--travel-to) 100%);
    border-color: rgba(217,119,6,0.3);
  }
  .ctravel .dn { color: var(--travel-num); }

  /* Off day — very subtle, just a dark surface */
  .coff {
    background: var(--off-bg);
    border-color: var(--bg-border);
  }
  .coff .dn { color: var(--off-num); }

  /* Pre-roster (June before 7 Jul) */
  .cpre {
    background: transparent;
    border-color: transparent;
  }
  .cpre .dn { color: var(--pre-num); }

  /* Empty grid spacer */
  .ce { background: transparent; border-color: transparent; }

  /* ── Pill colour variants ── */
  .pill-work   { background: var(--work-accent);   color: #fff; }
  .pill-travel { background: var(--travel-accent);  color: #fff; }
  .pill-ph     { background: var(--ph-color);       color: #fff; }
  .pill-bday   { background: var(--bday-color);     color: #fff; }
  .pill-sport  { background: var(--sport-color);    color: #fff; }

  /* ── Today button ── */
  #today-btn {
    position: fixed;
    bottom: 16px; right: 12px;
    background: var(--today-ring);
    color: #fff;
    border: none;
    border-radius: 20px;
    padding: 7px 14px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.04em;
    cursor: pointer;
    box-shadow: 0 2px 12px rgba(232,51,10,0.4);
    opacity: 0;
    transition: opacity 0.25s;
    z-index: 100;
  }
  #today-btn.visible { opacity: 1; }

  /* ── Countdown banner ── */
  #countdown-banner {
    position: fixed;
    bottom: 52px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    background: linear-gradient(135deg, #0D0F14, #161A23);
    border: 1px solid var(--bg-border);
    border-radius: 24px;
    padding: 9px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.6);
    white-space: nowrap;
    min-width: 230px;
    justify-content: center;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  .cd-icon  { font-size: 16px; line-height: 1; }
  .cd-main  { display: flex; flex-direction: column; align-items: flex-start; gap: 1px; }
  .cd-count { display: flex; align-items: baseline; gap: 4px; }
  .cd-days  {
    font-size: 22px;
    font-weight: 800;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
  }
  .cd-unit  { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
  .cd-label { font-size: 10px; color: var(--text-muted); letter-spacing: 0.04em; font-weight: 500; }

  #countdown-banner.on-swing  { border-color: rgba(59,130,212,0.4); }
  #countdown-banner.on-swing  .cd-days { color: var(--work-accent); }
  #countdown-banner.on-break  { border-color: rgba(29,184,84,0.35); }
  #countdown-banner.on-break  .cd-days { color: var(--green-accent); }
  #countdown-banner.on-travel { border-color: rgba(217,119,6,0.4); }
  #countdown-banner.on-travel .cd-days { color: var(--travel-accent); }
  #countdown-banner.pre-roster { border-color: var(--bg-border); }
  #countdown-banner.pre-roster .cd-days { color: var(--text-secondary); }

  /* Divider between months */
  .month-gap { height: 10px; }
</style>
</head>
<body>
<div class="wrap" id="wrap"></div>
<button id="today-btn" onclick="scrollToToday()">↑ Today</button>
<div id="countdown-banner">
  <span class="cd-icon" id="cd-icon"></span>
  <div class="cd-main">
    <div class="cd-count">
      <span class="cd-days" id="cd-days"></span>
      <span class="cd-unit" id="cd-unit"></span>
    </div>
    <div class="cd-label" id="cd-label"></div>
  </div>
</div>

<script>
// =============================================================================
// SECTION 1 — ROSTER ANCHOR DATE
// =============================================================================
const ANCHOR = new Date(2026, 6, 7); // 7 July 2026 = Crew A Day 1

// =============================================================================
// CREW ASSIGNMENT — change 'A' to 'B' if Luke moves to Crew B
// =============================================================================
const MY_CREW = 'A';

// =============================================================================
// SECTION 2 — QUEENSLAND PUBLIC HOLIDAYS
// =============================================================================
const PUBLIC_HOLIDAYS = {
  // --- 2026 ---
  "2026-04-03": "Good Friday",
  "2026-04-04": "Easter Sat",
  "2026-04-05": "Easter Sun",
  "2026-04-06": "Easter Mon",
  "2026-04-25": "ANZAC Day",
  "2026-05-04": "Labour Day",
  "2026-08-12": "Ekka (Bris)",
  "2026-10-05": "King's B'day",
  "2026-12-25": "Christmas Day",
  "2026-12-26": "Boxing Day",
  "2026-12-28": "Boxing Day+",
  // --- 2027 ---
  "2027-01-01": "New Year's Day",
  "2027-01-26": "Australia Day",
  "2027-03-26": "Good Friday",
  "2027-03-27": "Easter Sat",
  "2027-03-28": "Easter Sun",
  "2027-03-29": "Easter Mon",
  "2027-04-26": "ANZAC Day obs.",
  "2027-05-03": "Labour Day",
  "2027-08-11": "Ekka (Bris)",
  "2027-10-04": "King's B'day",
  "2027-12-24": "Xmas Eve 6pm",
  "2027-12-25": "Christmas Day",
  "2027-12-26": "Boxing Day",
  "2027-12-27": "Xmas Day+",
  "2027-12-28": "Boxing Day+",
  // --- 2028 ---
  "2028-01-01": "New Year's Day",
  "2028-01-03": "New Year+",
  "2028-01-26": "Australia Day",
  "2028-04-14": "Good Friday",
  "2028-04-15": "Easter Sat",
  "2028-04-16": "Easter Sun",
  "2028-04-17": "Easter Mon",
  "2028-04-25": "ANZAC Day",
  "2028-05-01": "Labour Day",
  "2028-08-16": "Ekka (Bris)",
  "2028-10-02": "King's B'day",
  "2028-12-24": "Xmas Eve 6pm",
  "2028-12-25": "Christmas Day",
  "2028-12-26": "Boxing Day",
  // --- ADD 2029 BELOW when published (usually Nov/Dec 2028) ---
  // Source: https://www.queenslandpublicholidays.com.au/
};

// =============================================================================
// SECTION 3 — FAMILY BIRTHDAYS (repeat every year automatically)
// =============================================================================
const BIRTHDAYS = {
  "01-16": "Luke",
  "01-17": "Adriana",
  "02-20": "Michael",
  "03-01": "Mum",
  "04-22": "Dad",
  "08-17": "Steph",
  "08-18": "Stefaniya",
  "11-14": "David",
  "12-20": "Kayleen",
};

// =============================================================================
// SECTION 4 — SPORTS & SPECIAL EVENTS (confirmed dates only)
// =============================================================================
const SPORTS = {
  "2026-09-26": "AFL GF 2026",
  "2026-10-04": "NRL GF 2026",
  "2027-02-14": "Super Bowl LXI",
  "2027-05-30": "PL Final Day",
  // "2028-02-13": "Super Bowl LXII",
};

// =============================================================================
// SECTION 5 — CALENDAR RANGE
// =============================================================================
const MIN = { y: 2026, m: 5 };  // June 2026
const MAX = { y: 2028, m: 11 }; // December 2028

// =============================================================================
// CALENDAR LOGIC
// =============================================================================
const MONTHS = ['January','February','March','April','May','June','July',
                'August','September','October','November','December'];
const DAYS_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function mdKey(d) {
  return `${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function getPos(date) {
  const d = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  if (d < ANCHOR) return -1;
  return Math.round((d - ANCHOR) / 86400000) % 14;
}
function myStatus(date) {
  const pos = getPos(date);
  if (pos === -1) return null;
  if (MY_CREW === 'A') {
    if (pos === 0 || pos === 7) return 'travel';
    if (pos >= 1 && pos <= 6)  return 'work';
    return 'off';
  } else {
    if (pos === 7 || pos === 0) return 'travel';
    if (pos >= 8 && pos <= 13) return 'work';
    return 'off';
  }
}
function workDayNum(date) {
  const pos = getPos(date);
  if (MY_CREW === 'A') {
    if (pos === 0) return 1;
    if (pos >= 1 && pos <= 6) return pos + 1;
    if (pos === 7) return 8;
  } else {
    if (pos === 7) return 1;
    if (pos >= 8 && pos <= 13) return pos - 6;
    if (pos === 0) return 8;
  }
  return null;
}

function buildMonth(year, month, isFirst) {
  const first = new Date(year, month, 1);
  const last  = new Date(year, month + 1, 0);
  const today = new Date();
  const isCurrentMonth = year === today.getFullYear() && month === today.getMonth();

  let html = `<div class="month-block" id="m-${year}-${month}">`;

  // Page header — only on very first month
  if (isFirst) {
    html += `<div class="page-header">
      <div class="title">FIFO Roster</div>
      <div class="subtitle">Luke Barton</div>
      <div class="crew-badge">Crew ${MY_CREW} &nbsp;·&nbsp; 8 on / 6 off</div>
    </div>
    <div class="legend">
      <div class="leg"><div class="ldot" style="background:var(--work-accent)"></div>Working</div>
      <div class="leg"><div class="ldot" style="background:var(--travel-accent)"></div>Travel</div>
      <div class="leg"><div class="ldot" style="background:var(--off-bg);border:1px solid var(--bg-border)"></div>Days Off</div>
      <div class="leg"><div class="ldot" style="background:var(--ph-color)"></div>Public Hol</div>
      <div class="leg"><div class="ldot" style="background:var(--bday-color)"></div>Birthday</div>
      <div class="leg"><div class="ldot" style="background:var(--sport-color)"></div>Sport</div>
    </div>`;
  }

  // Sticky month title
  html += `<div class="month-sticky">
    <div class="month-title">
      <span class="spacer"></span>
      <span>${MONTHS[month]} ${year}</span>
      ${isCurrentMonth ? '<span class="current-dot"></span>' : '<span class="spacer"></span>'}
    </div>
  </div>`;

  // Grid
  html += `<div class="month-grid">`;
  DAYS_SHORT.forEach(d => { html += `<div class="dh">${d}</div>`; });

  // Empty cells
  for (let i = 0; i < first.getDay(); i++) {
    html += `<div class="dc ce"></div>`;
  }

  // Day cells
  for (let d = 1; d <= last.getDate(); d++) {
    const date    = new Date(year, month, d);
    const status  = myStatus(date);
    const isToday = date.toDateString() === today.toDateString();
    const dk = dateKey(date);
    const mk = mdKey(date);
    const ph = PUBLIC_HOLIDAYS[dk];
    const bd = BIRTHDAYS[mk];
    const sp = SPORTS[dk];

    let cellCls = 'cpre';
    let pills   = '';

    if (status === 'travel') {
      cellCls = 'ctravel';
      const dn = workDayNum(date);
      pills += `<span class="pill pill-travel">✈ D${dn}</span>`;
    } else if (status === 'work') {
      cellCls = 'cwork';
      const dn = workDayNum(date);
      pills += `<span class="pill pill-work">Day ${dn}</span>`;
    } else if (status === 'off') {
      cellCls = 'coff';
    }

    if (ph) pills += `<span class="pill pill-ph">${ph.length > 11 ? ph.substring(0,11)+'…' : ph}</span>`;
    if (bd) pills += `<span class="pill pill-bday">🎂 ${bd}</span>`;
    if (sp) pills += `<span class="pill pill-sport">${sp}</span>`;

    const todayId  = isToday ? ' id="today-cell"' : '';
    const todayCls = isToday ? ' today-cell' : '';

    html += `<div class="dc ${cellCls}${todayCls}"${todayId}>
      <div class="dn">${d}</div>${pills}
    </div>`;
  }

  html += `</div><div class="month-gap"></div></div>`;
  return html;
}

// Build all months
const wrap = document.getElementById('wrap');
let html = '', y = MIN.y, mo = MIN.m, isFirst = true;
while (y < MAX.y || (y === MAX.y && mo <= MAX.m)) {
  html += buildMonth(y, mo, isFirst);
  isFirst = false;
  if (++mo > 11) { mo = 0; y++; }
}
wrap.innerHTML = html;

// =============================================================================
// COUNTDOWN BANNER
// =============================================================================
function updateCountdown() {
  const today = new Date();
  today.setHours(0,0,0,0);
  const diff   = Math.round((today - ANCHOR) / 86400000);
  const banner = document.getElementById('countdown-banner');
  const icon   = document.getElementById('cd-icon');
  const days   = document.getElementById('cd-days');
  const unit   = document.getElementById('cd-unit');
  const label  = document.getElementById('cd-label');

  // Pre-roster
  if (diff < 0) {
    const n = Math.abs(diff) - 1;
    banner.className  = 'pre-roster';
    icon.textContent  = '📅';
    days.textContent  = n;
    unit.textContent  = n === 1 ? 'day' : 'days';
    label.textContent = 'until roster starts — 7 Jul';
    return;
  }

  const pos = diff % 14;
  let state, daysLeft;

  if (MY_CREW === 'A') {
    if (pos === 0)                  { state = 'travel-start'; daysLeft = 7; }
    else if (pos >= 1 && pos <= 6) { state = 'swing';        daysLeft = 7 - pos; }
    else if (pos === 7)             { state = 'travel-end';   daysLeft = 0; }
    else                            { state = 'break';        daysLeft = 14 - pos; }
  } else {
    if (pos === 7)                  { state = 'travel-start'; daysLeft = 7; }
    else if (pos >= 8 && pos <= 13){ state = 'swing';        daysLeft = 14 - pos; }
    else if (pos === 0)             { state = 'travel-end';   daysLeft = 0; }
    else                            { state = 'break';        daysLeft = 7 - pos; }
  }

  if (state === 'travel-end') {
    banner.className  = 'on-travel';
    icon.textContent  = '✈️';
    days.textContent  = 'Last';
    unit.textContent  = 'day';
    label.textContent = 'handover & travel home today';
  } else if (state === 'travel-start') {
    banner.className  = 'on-travel';
    icon.textContent  = '✈️';
    days.textContent  = 'First';
    unit.textContent  = 'day';
    label.textContent = `travel in — ${daysLeft} days left on swing`;
  } else if (state === 'swing') {
    banner.className  = 'on-swing';
    icon.textContent  = '⛏️';
    days.textContent  = daysLeft;
    unit.textContent  = daysLeft === 1 ? 'day' : 'days';
    label.textContent = 'until end of swing';
  } else {
    banner.className  = 'on-break';
    icon.textContent  = '🏖️';
    days.textContent  = daysLeft;
    unit.textContent  = daysLeft === 1 ? 'day' : 'days';
    label.textContent = 'until end of break';
  }
}

updateCountdown();

// Auto-scroll to current month on load
function scrollToToday() {
  const el = document.getElementById('today-cell');
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  document.getElementById('today-btn').classList.remove('visible');
}
setTimeout(() => {
  const today = new Date();
  const el = document.getElementById(`m-${today.getFullYear()}-${today.getMonth()}`);
  if (el) el.scrollIntoView({ behavior: 'auto', block: 'start' });
}, 80);

// Show ↑ Today when scrolled away
window.addEventListener('scroll', () => {
  const cell = document.getElementById('today-cell');
  if (!cell) return;
  const r = cell.getBoundingClientRect();
  document.getElementById('today-btn').classList.toggle('visible',
    r.bottom < 0 || r.top > window.innerHeight);
});
</script>
